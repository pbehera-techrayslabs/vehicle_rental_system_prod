<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RentWheels</title>
    <link href="../../dist/styles/output.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-linear-to-br from-blue-600 to-blue-800 min-h-screen flex flex-col"><!-- HEADER -->
    <header class="bg-white/20 backdrop-blur-md text-white p-4 flex items-center shadow"><a href="../../index.html"
            class="bg-white text-blue-600 px-4 py-1 rounded-lg mr-4 font-semibold hover:bg-gray-200 transition">

            ← Back

        </a>
        <h1 class="text-xl font-bold tracking-wide">🚗 RentWheels

        </h1>
    </header>
    <div id="toast-box" class="flex justify-center items-start top-0"></div>
    <div class="flex grow items-center justify-center px-4">
        <div class="bg-white shadow-2xl rounded-xl p-10 w-95">
            <h2 class="text-3xl font-bold text-center mb-6 text-gray-800">Login

            </h2>
            <form id="loginForm"><select id="role"
                    class="border p-3 w-full mb-4 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">

                    <option value="user">User Login</option>
                    <option value="admin">Admin Login</option>
                </select><input id="email" type="email" placeholder="Enter your email"
                    class="border p-3 w-full mb-4 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" />

                <input id="password" type="password" placeholder="Enter your password"
                    class="border p-3 w-full mb-5 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" />

                <button
                    class="bg-linear-to-r from-blue-600 to-blue-500 text-white w-full py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-blue-600 transition duration-300 shadow-lg">

                    Login

                </button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-600">New user?

                <a href="../pages/register.html" class="text-blue-600 font-semibold hover:underline">

                    Register here

                </a>
            </p>
        </div>
    </div>
    <script type="module" src="../../dist/scripts/login.js"></script>
</body>

</html>
