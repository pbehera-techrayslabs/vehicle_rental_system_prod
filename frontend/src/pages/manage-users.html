<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users | RentWheels</title>
    <link href="/frontend/dist/styles/output.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-linear-to-b from-blue-800 to-blue-200 min-h-screen">
    <header class="bg-linear-to-r from-blue-700 to-blue-500 text-white shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
            <h1 class="text-2xl font-bold">👥 Manage Users

            </h1><a href="/frontend/src/pages/admin-dashboard.html"
                class="bg-white text-blue-600 px-4 py-1 rounded-lg font-semibold hover:bg-gray-200 transition">

                ← Back

            </a>
        </div>
    </header>
     <div id="toast-box" class="flex justify-center items-start top-0"></div>
    <section class="max-w-6xl mx-auto py-12 px-4">
        <div class="bg-white shadow-xl rounded-xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-gray-800">Registered Users

                </h2>
                <p class="text-gray-600">Total Users:
                    <span id="userCount" class="font-bold">0</span>

                </p>
            </div><input id="searchUser" type="text" placeholder="Search user by name or email..."
                class="border p-3 w-full mb-6 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" />

            
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 uppercase text-sm">
                            <th class="p-4 text-center">Name</th>
                            <th class="p-4 text-center">Email</th>
                            <th class="p-4 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-table" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </section>
    <script type="module" src="/frontend/dist/scripts/manageUsers.js"></script>
</body>

</html>
