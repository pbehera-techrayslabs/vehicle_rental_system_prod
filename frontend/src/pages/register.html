<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | RentWheels</title>
    <link href="/frontend/dist/styles/output.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col bg-linear-to-br from-blue-500 to-indigo-600">

    <!-- HEADER -->
    <header class="bg-white/20 backdrop-blur-md text-white p-4 flex items-center shadow-md">
        <a href="/frontend/index.html"
            class="bg-white text-blue-600 px-3 py-1 rounded mr-4 hover:bg-gray-100 transition">

            ← Back

        </a>

        <h1 class="text-lg font-semibold tracking-wide">
            RentWheels
        </h1>
    </header>


    <!-- REGISTER FORM -->
    <div class="flex grow items-center justify-center">

        <div class="bg-white rounded-xl shadow-2xl p-8 w-96">

            <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
                Create Account
            </h2>

            <form id="registerForm" class="space-y-4">

                <input id="name" type="text" placeholder="Full Name"
                    class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />

                <input id="email" type="email" placeholder="Email"
                    class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />

                <input id="password" type="password" placeholder="Password" maxlength="8"
                    class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />

                <button
                    class="bg-green-600 text-white w-full py-2 rounded hover:bg-green-700 transition duration-300 font-semibold">

                    Create Account

                </button>

            </form>

            <p class="mt-5 text-center text-sm text-gray-600">

                Already registered?

                <a href="/frontend/src/pages/login.html" class="text-blue-600 font-semibold hover:underline">

                    Login

                </a>

            </p>

        </div>

    </div>


    <script type="module" src="/frontend/dist/scripts/register.js"></script>

</body>

</html>
