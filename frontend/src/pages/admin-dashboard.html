<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Vehicle Rental System</title>
    <link href="/frontend/dist/styles/output.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen">
    <header class="bg-blue-600 text-white p-4 flex justify-between">
        <h1 class="text-xl font-bold">
            Admin Dashboard
        </h1><button id="logoutBtn" class="bg-red-500 px-4 py-1 rounded">
            Logout
        </button>
    </header>
    <section class="max-w-6xl mx-auto py-10">
        <h2 class="text-2xl font-bold mb-6">Dashboard Overview

        </h2>
        <div class="grid md:grid-cols-4 gap-6 mb-10">
            <div class="bg-white shadow p-6 rounded text-center">
                <h3 class="text-gray-500">Total Vehicles</h3>
                <p id="totalVehicles" class="text-3xl font-bold mt-2">0</p>
            </div>
            <div class="bg-white shadow p-6 rounded text-center">
                <h3 class="text-gray-500">Total Users</h3>
                <p id="totalUsers" class="text-3xl font-bold mt-2">0</p>
            </div>
            <div class="bg-white shadow p-6 rounded text-center">
                <h3 class="text-gray-500">Total Bookings</h3>
                <p id="totalBookings" class="text-3xl font-bold mt-2">0</p>
            </div>
            <div class="bg-white shadow p-6 rounded text-center">
                <h3 class="text-gray-500">Today's Bookings</h3>
                <p id="todayBookings" class="text-3xl font-bold mt-2">0</p>
            </div>
        </div>
        <div class="grid md:grid-cols-3 gap-6"><a href="/frontend/src/pages/manage-vehicles.html"
                class="bg-blue-600 text-white p-6 rounded text-center">

                Manage Vehicles

            </a><a href="/frontend/src/pages/manage-users.html" class="bg-green-600 text-white p-6 rounded text-center">

                Manage Users

            </a><a href="/frontend/src/pages/view-bookings.html" class="bg-purple-600 text-white p-6 rounded text-center">

                View Bookings

            </a></div>
    </section>
    <script type="module" src="/frontend/dist/scripts/adminDashboard.js"></script>
</body>

</html>
