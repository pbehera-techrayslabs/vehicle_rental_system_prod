<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Vehicles | Vehicle Rental System</title>
    <link href="/frontend/dist/styles/output.css" rel="stylesheet">
</head>

<body class="bg-linear-to-tr from-blue-500 to-blue-100 min-h-screen">
    <header class="bg-blue-600 text-white p-4 flex justify-between">
        <h1 class="text-xl font-bold">
            Manage Vehicles
        </h1><a href="/frontend/src/pages/admin-dashboard.html">
            Back
        </a>
    </header>
    <section class="max-w-6xl mx-auto py-10">
        <h2 id="formTitle" class="text-2xl font-bold mb-6 ">Add Vehicle

        </h2>
        <form id="vehicleForm" class="grid md:grid-cols-3 gap-4 mb-10"><input type="hidden" id="vehicleId">
            <input
                id="name" placeholder="Vehicle Name" class="border p-2 rounded" required/>

            <select id="type" class="border p-2 rounded">

                <option value="Car">Car</option>
                <option value="Bike">Bike</option>
                <option value="Scooty">Scooty</option>
            </select>
            <input id="price" type="number" placeholder="Price per day" class="border p-2 rounded" required/>

            <button id="submitBtn" class="bg-green-600 text-white px-4 py-2 rounded">

                Add Vehicle

            </button>
        </form>
        <h2 class="text-2xl font-bold mb-4">Vehicle List

        </h2>
        <div id="vehicle-list" class="grid md:grid-cols-3 gap-6"></div>
    </section>
    <script type="module" src="/frontend/dist/scripts/manageVehicles.js"></script>
</body>

</html>
