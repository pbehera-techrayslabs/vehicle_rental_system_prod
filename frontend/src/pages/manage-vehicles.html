<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Vehicles | RentWheels</title>
    <link href="/frontend/dist/styles/output.css" rel="stylesheet">
</head>

<body class="bg-linear-to-b from-blue-800 to-blue-200 min-h-screen">
    <header class="bg-blue-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
            <h1 class="text-2xl font-bold">
                🚗 Manage Vehicles
            </h1><a href="/frontend/src/pages/admin-dashboard.html"
                class="bg-white text-blue-700 px-4 py-1 rounded-lg font-semibold hover:bg-gray-200 transition">

                ← Back

            </a>
        </div>
    </header>
    <section class="max-w-6xl mx-auto py-10 px-4">
        <div class="bg-white shadow-xl rounded-xl p-8 mb-10">
            <h2 id="formTitle" class="text-2xl font-bold mb-6 text-gray-800">Add Vehicle

            </h2>
            <form id="vehicleForm" class="grid md:grid-cols-3 gap-4"><input type="hidden" id="vehicleId"><input
                    id="name" placeholder="Vehicle Name"
                    class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required />

                <select id="type" class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">

                    <option value="Car">Car</option>
                    <option value="Bike">Bike</option>
                    <option value="Scooty">Scooty</option>
                </select><input id="price" type="number" placeholder="Price per day"
                    class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required />

                <button id="submitBtn"
                    class="md:col-span-3 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition shadow">

                    Add Vehicle

                </button>
            </form>
        </div>
        <div class="bg-white shadow-xl rounded-xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Vehicle List

                </h2>
                <p class="text-gray-600">Total Vehicles:
                    <span id="vehicleCount" class="font-bold">0</span>

                </p>
            </div>
            <input id="searchVehicle" type="text" placeholder="Search vehicle by name..."
                class="border p-3 w-full mb-6 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" />
            <select id="filterType"
                class="border p-3 w-full mb-6 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">

                <option value="All">All Vehicles</option>
                <option value="Car">Cars</option>
                <option value="Bike">Bikes</option>
                <option value="Scooty">Scooties</option>
            </select>
            <div id="vehicle-list" class="grid md:grid-cols-3 gap-6"></div>
        </div>
    </section>
    <script type="module" src="/frontend/dist/scripts/manageVehicles.js"></script>
</body>

</html>
